name: dbt CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/add-github-actions

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-duckdb

      - name: Check dbt version
        run: dbt --version

      - name: Install dbt packages
        run: dbt deps

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          dbt_learning:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                threads: 1
          EOF



      - name: Compile dbt project
        run: dbt compile

      - name: Run dbt build
        run: dbt build